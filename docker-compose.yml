version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: circular_economy
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    ports:
      - "4000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/circular_economy
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
